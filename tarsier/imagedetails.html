<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/pico.min.css">
  <link rel="shortcut icon" href="favicon.png">
  <title>Tarsier — image details</title>
  <style>
    .hero { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; }
    .hero img.logo { width: 90px; height: auto; }
    .hero h1 { margin: 0; font-size: 1.3rem; }
    .detail { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 1.5rem; align-items: start; }
    @media (max-width: 640px) { .detail { grid-template-columns: 1fr; } }
    .detail img.preview { width: 100%; height: auto; border-radius: 8px; background: #f3f1ea; }
    table.meta td { padding: 0.3rem 0.5rem; vertical-align: top; font-size: 0.9rem; }
    table.meta td.k { color: var(--muted-color); white-space: nowrap; }
    a.upload-btn { display: inline-block; margin-top: 1rem; }
    .notice { padding: 2rem 1rem; text-align: center; color: var(--muted-color); }
  </style>
</head>
<body>
  <main class="container">
    <header class="hero">
      <a href="index.html"><img class="logo" src="images/tarsier-01.png" alt="Tarsier logo"></a>
      <div><h1>Tarsier — image details</h1></div>
    </header>
    <div id="panel"></div>
  </main>
  <footer class="container">
    <hr>
    <small>Made by Andra Waagmeester for the Wikiproject Biodiversity.</small>
  </footer>

  <script>
  (function () {
    "use strict";
    var API = "https://api.gbif.org/v1";
    var panel = document.getElementById("panel");
    var params = Object.fromEntries(new URLSearchParams(location.search).entries());

    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    var occ = null;
    try { occ = JSON.parse(localStorage.getItem("occuranceData_" + params.occurenceId)); } catch (e) {}

    if (!occ || !params.mediaId) {
      panel.innerHTML = '<div class="notice"><p>This image is no longer in your browser\'s cache ' +
        '(it is stored only after you open it from a search). ' +
        'Please <a href="index.html">run the search again</a> and reopen the image.</p></div>';
      return;
    }

    // Map a free-text media license to the Wikimedia Commons license template name.
    function wmLicense(raw) {
      var s = String(raw || "").toLowerCase();
      if (s.indexOf("zero") > -1 || s.indexOf("cc0") > -1 || s.indexOf("cc-zero") > -1) return "Cc-zero";
      if (s.indexOf("by-nc") > -1 || s.indexOf("by-nd") > -1) return null;
      if (s.indexOf("by-sa") > -1) return "cc-by-sa-4.0";
      if (s.indexOf("licenses/by/") > -1 || /\bcc[ -]?by\b/.test(s)) return "cc-by-4.0";
      return null;
    }

    var EXT = {
      "image/jpeg": ".jpg", "image/jpg": ".jpg", "image/png": ".png",
      "image/gif": ".gif", "image/tiff": ".tif", "image/webp": ".webp"
    };

    var INSTITUTE_TEMPLATE = {
      "Naturalis Biodiversity Center": "{{Institution:Naturalis}}",
      "Natural History Museum": "{{Institution:Natural History Museum, London}}",
      "MNHN - Museum national d'Histoire naturelle": "{{Institution:Muséum national d'histoire naturelle}}"
    };

    // Find the media entry the user clicked (fall back to the first one).
    var media = (occ.media || []).filter(function (m) { return m.identifier === params.mediaId; })[0] ||
                (occ.media || [])[0] || {};

    function render(orgTitle) {
      var institution = orgTitle || occ.datasetName || occ.institutionCode || "Unknown source";
      var wm = wmLicense(media.license);
      var ext = EXT[(media.format || "").toLowerCase()] || "";
      var sciName = occ.acceptedScientificName || occ.scientificName || "Unknown taxon";

      var meta =
        '<table class="meta">' +
          row("Scientific name", esc(sciName)) +
          row("GBIF occurrence", '<a href="https://www.gbif.org/occurrence/' + encodeURIComponent(occ.gbifID || occ.key) + '">' + esc(occ.gbifID || occ.key) + '</a>') +
          row("License", esc(media.license || "—")) +
          row("Institution", esc(institution)) +
          (occ.recordedBy ? row("Recorded by", esc(occ.recordedBy)) : "") +
          (occ.eventDate ? row("Date", esc(occ.eventDate)) : "") +
        '</table>';

      var action;
      if (wm) {
        action = '<a class="upload-btn" role="button" href="' + esc(buildCommonsUrl(institution, wm, ext, sciName)) +
          '" target="_blank" rel="noopener">Upload to Wikimedia Commons</a>' +
          '<p><small>Opens a pre-filled Commons upload form. Upload-by-URL only works for ' +
          '<a href="https://commons.wikimedia.org/wiki/Commons:Upload_tools/wgCopyUploadsDomains" target="_blank" rel="noopener">approved source domains</a>; ' +
          'a Wikimedia account is required.</small></p>';
      } else {
        action = '<p><small>This image\'s license (' + esc(media.license || "unspecified") +
          ') is not compatible with Wikimedia Commons.</small></p>';
      }

      panel.innerHTML =
        '<div class="detail">' +
          '<div><img class="preview" src="' + esc(media.identifier) + '" alt="' + esc(sciName) +
            '" onerror="this.onerror=null;this.src=\'images/tarsier-01.png\';"></div>' +
          '<div><h2 style="font-style:italic;margin-top:0;">' + esc(sciName) + '</h2>' + meta + action + '</div>' +
        '</div>';
    }

    function row(k, v) { return '<tr><td class="k">' + k + '</td><td>' + v + '</td></tr>'; }

    function buildCommonsUrl(institution, wm, ext, sciName) {
      var gbifID = occ.gbifID || occ.key;
      var author = INSTITUTE_TEMPLATE[institution] || institution;
      if (!INSTITUTE_TEMPLATE[institution]) {
        var extra = [];
        if (occ.rightsHolder && occ.rightsHolder !== institution) extra.push(occ.rightsHolder);
        if (occ.recordedBy && occ.recordedBy !== occ.rightsHolder) extra.push(occ.recordedBy);
        if (extra.length) author += " (" + extra.join(", ").replace(/\|/g, ", ") + ")";
      }

      var taxonCat = "";
      if (occ.taxonRank && occ[occ.taxonRank.toLowerCase()]) taxonCat = occ[occ.taxonRank.toLowerCase()];

      var desc =
        "{{Information\n" +
        "|description={{en|" + sciName + " " + gbifID + "}}\n" +
        "|date=" + (occ.eventDate || "") + "\n" +
        "|source=https://www.gbif.org/occurrence/" + gbifID + "\n" +
        "|author=" + author + "\n" +
        "|permission=\n|other versions=\n}}\n\n" +
        (taxonCat ? "[[Category:" + taxonCat + "]]\n" : "") +
        (occ.decimalLatitude != null ? "{{location|" + occ.decimalLatitude + "|" + occ.decimalLongitude + "}}\n" : "") +
        "{{Gbif|" + gbifID + "}}\n" +
        "[[Category:Reuse images with Tarsier]]\n";

      var destFile = (sciName + " " + gbifID + ext).replace(/[\[\]{}|#<>]/g, "");

      return "https://commons.wikimedia.org/wiki/Special:Upload" +
        "?wpUploadDescription=" + encodeURIComponent(desc) +
        "&wpLicense=" + encodeURIComponent(wm) +
        "&wpDestFile=" + encodeURIComponent(destFile) +
        "&wpSourceType=url" +
        "&wpUploadFileURL=" + encodeURIComponent(media.identifier);
    }

    // The hosting-organization title is needed for the institution template; fetch it if we
    // have a key, otherwise fall back to dataset/institution fields already on the occurrence.
    var orgKey = occ.hostingOrganizationKey || occ.publishingOrgKey;
    if (orgKey) {
      fetch(API + "/organization/" + orgKey, { headers: { Accept: "application/json" } })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (o) { render(o && o.title); })
        .catch(function () { render(null); });
    } else {
      render(null);
    }
  })();
  </script>
</body>
</html>
